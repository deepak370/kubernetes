apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishinest-service
  namespace: testing
  annotations:
 #   deployment.kubernetes.io/revision: "1"
    kubernetes.io/change-cause: "added revision history and commented revision"
spec:
  replicas: 1                 
  selector:
    matchLabels:
      app: krishinest-service
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: krishinest-service
        version: "1.0"
    spec:
      terminationGracePeriodSeconds: 60   # let Fluent Bit flush before shutdown
      imagePullSecrets:
        - name: dockerhub-secret
      containers:

        # ══ Container 1 — krishinest app (unchanged + log volumes) ══
        - name: krishinest-service
          image: deepakshaktivel243/krishinest:v2
          ports:
            - containerPort: 80
          volumeMounts:
            - name: env-file
              mountPath: /var/www/html/krishinest/live/.env
              subPath: .env
            # ── NEW: shared log volumes (app writes here) ──
            - name: laravel-logs
              mountPath: /var/www/html/krishinest/live/storage/logs
            - name: nginx-logs
              mountPath: /var/log/nginx
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2

        # ══ Container 2 — Fluent Bit sidecar (NEW) ═══════════════
        - name: fluent-bit
          image: fluent/fluent-bit:5.0.8
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            # Read the same volumes the app writes to
            - name: laravel-logs
              mountPath: /var/www/html/krishinest/live/storage/logs
              readOnly: true
            - name: nginx-logs
              mountPath: /var/log/nginx
              readOnly: true
            # Config
            - name: fluentbit-config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            # Position DB + filesystem buffer
            - name: fluentbit-state
              mountPath: /var/lib/fluent-bit
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

      volumes:
        - name: env-file
          secret:
            secretName: krishinest-env
        # ── NEW volumes ──
        - name: laravel-logs
          emptyDir: {}
        - name: nginx-logs
          emptyDir: {}
        - name: fluentbit-state
          emptyDir: {}
        - name: fluentbit-config
          configMap:
            name: fluentbit-config
---
apiVersion: v1
kind: Service
metadata:
  name: krishinest-service
  namespace: testing
spec:
  type: ClusterIP
  selector:
    app: krishinest-service
  ports:
    - port: 80
      targetPort: 80
