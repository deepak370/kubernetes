apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: testing
spec:
  serviceName: mysql-service
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:         # pull from Secret
                  name: secrets
                  key: DB_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:      # pull from ConfigMap
                  name: test-config
                  key: DB_NAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DB_PASSWORD
            - name: MYSQL_USER
              value: "test_user"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql    # where MySQL stores its data files
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysql -u test_user -p$MYSQL_PASSWORD -e "SELECT 1"
            initialDelaySeconds: 20
            periodSeconds: 5
  volumeClaimTemplates:               # StatefulSet auto-creates a PVC per pod
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---

# Headless service — required for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: testing
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
